<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Achtung! Cthulhu Character Sheet</title>
    <style>
        /* Base Configuration */
        body { 
            padding: 20px; 
            background-color: #f4f4f4; 
            font-family: Arial, sans-serif; 
            color: #333;
        }
        
        .charsheet { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15); 
            width: 1000px;  
            margin: 0 auto;            
            box-sizing: border-box;
        }

        /* Thematic section banners */
        .section-banner {
            background-color: #4a5d34; /* Military Olive Green */
            color: white;
            padding: 10px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            margin-top: 25px;
            box-sizing: border-box;
        }

        /* Title Header */
        .main-header-banner {
            background-color: #4a5d34; 
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 4px;
        }
        .main-header-banner h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* IDENTITY SYSTEM (3 Columns x 2 Rows) */
        .identity-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .field-box {
            display: flex;
            flex-direction: column;
        }
        .field-box label {
            background-color: #4a5d34;
            color: white;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px 4px 0 0;
            text-transform: uppercase;
        }
        .field-box input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            font-size: 15px;
            box-sizing: border-box;
            width: 100%;
            background-color: #fafafa;
        }

        /* PERSONAL TRUTHS GRID */
        .truths-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
        }
        .truths-row textarea {
            width: 100%;
            min-height: 65px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
            background-color: #fafafa;
        }

        /* ATTRIBUTES & BONUS FRAMEWOK */
        .attributes-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
        }
        .attribute-card {
            background: #fdfdfd;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .attribute-card label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: #555;
        }

        /* Custom Suffix Spliced Ticker Layout */
        .cd-ticker-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 10px;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
        }
        .cd-ticker-btn {
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 3px;
            width: 20px;
            height: 24px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .cd-ticker-btn:hover { background: #ddd; }
        .cd-display-input {
            width: 55px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            padding: 3px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fdfdfd;
        }

        /* Standard Number Tickers with Arrows */
        input[type="number"] {
            width: 100%;
            max-width: 65px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin: 0 auto;
            display: block;
        }

        /* STRESS & TICKERS TWO-COLUMN GRID */
        .dashboard-layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            box-sizing: border-box;
        }
        .dashboard-block {
            background: #fdfdfd;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
        }
        .dashboard-block h3 {
            margin: 0 0 15px 0;
            color: #4a5d34;
            font-size: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        /* Single Unified Math Engine Styling */
        .unified-math-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #fcfcfc;
            border: 1px solid #eee;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .math-box-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .math-box-node label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
            text-align: center;
        }
        .unified-math-row .math-sign {
            font-weight: bold;
            font-size: 20px;
            color: #888;
            margin-top: 18px;
        }
        .math-box-node input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            border-color: #ced4da;
            cursor: not-allowed;
        }

        /* 20 Checkbox Tracking Cluster */
        .checkbox-matrix-20 {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            justify-items: center;
            padding: 5px 0;
        }
        .checkbox-matrix-20 input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin: 0;
            transition: all 0.2s ease;
        }
        /* Lockout Styles for Disabled State */
        .checkbox-matrix-20 input[type="checkbox"]:disabled {
            opacity: 0.15;
            cursor: not-allowed;
        }

        /* Resource Ticker Grid (Right Side) */
        .ticker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }
