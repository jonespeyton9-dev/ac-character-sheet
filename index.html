<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Achtung! Cthulhu Character Sheet</title>
    <link rel="stylesheet" href="Achtung!_Cthulhu_2d20.css">
    <style>
        body { padding: 20px; background-color: #f4f4f4; font-family: sans-serif; }
        
        .charsheet { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1); 
            width: 1100px !important;  /* Forces the actual container to be wider */
            margin: 0 auto;            /* Keeps it beautifully centered */
            box-sizing: border-box;
        }

        /* Forces the inner Roll20 rows to stretch out and use the new 1100px width */
        .charsheet .sheet-main_char, 
        .charsheet .sheet-equipment, 
        .charsheet section {
            width: 100% !important;
        }

        /* FIX: Pinpoints ONLY the first two identity rows at the very top */
        .sheet-main_char > .f-row:nth-of-type(1),
        .sheet-main_char > .f-row:nth-of-type(2) {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important; /* 3 clean boxes per row */
            gap: 20px !important;  /* Creates comfortable padding between fields */
            width: 100% !important;
            margin-bottom: 20px !important;
        }

        /* FIX: Forces labels inside those top two identity rows to stack vertically */
        .sheet-main_char > .f-row:nth-of-type(1) > .f-col,
        .sheet-main_char > .f-row:nth-of-type(2) > .f-col {
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-start !important;
            width: 100% !important;
            gap: 4px !important;
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
        }

        /* FIX: Prevents the green header banners from bleeding horizontally */
        .sheet-main_char > .f-row:nth-of-type(1) label,
        .sheet-main_char > .f-row:nth-of-type(2) label {
            display: block !important;
            width: 100% !important;
            text-align: left !important;
            margin: 0 !important;
            padding: 6px 10px !important;
            box-sizing: border-box !important;
            height: auto !important;
        }

        /* FIX: Contains text inputs neatly underneath their green headers */
        .sheet-main_char > .f-row:nth-of-type(1) input[type="text"],
        .sheet-main_char > .f-row:nth-of-type(2) input[type="text"] {
            display: block !important;
            width: 100% !important;
            margin: 0 !important;
            box-sizing: border-box !important;
        }

        /* FIX: Protects Personal Truths & Scars layout from the grid logic entirely */
        .sheet-main_char .truth_text,
        .sheet-main_char .injuries {
            display: block !important;
            width: 100% !important;
            clear: both !important;
            margin-top: 15px !important;
        }

        .sheet-main_char .truth_text .f-row,
        .sheet-main_char .injuries .f-row {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            width: 100% !important;
            gap: 15px !important;
        }

        .sheet-main_char .truth_text .f-col,
        .sheet-main_char .injuries .f-col {
            display: block !important;
            flex: 1 !important;
        }

        /* Forces the attributes to align side-by-side neatly with plenty of room */
        .attr.f-row.nowrap {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important; 
            gap: 15px;
            width: 100% !important;
        }
        
        .attr .f-col {
            display: block !important;
            flex: 1;
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 4px;
            text-align: center !important;
        }

        .attr .f-col label {
            text-align: center !important;
            display: block !important;
            width: 100% !important;
        }

        /* Forces number boxes to stay inside their lanes */
        input[type="number"] {
            width: 100% !important;
            max-width: 70px;
            box-sizing: border-box;
            padding: 4px;
            margin: 4px auto !important;
            display: block;
            text-align: center;
        }

        /* FIX: Pulls the math symbols (+, -, =) back up next to the stress inputs */
        .stress .f1 {
            display: inline-flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 6px;
        }

        .stress .f1 input[type="number"] {
            display: inline-block !important;
            margin: 0 !important;
        }

        /* FIX: Adds spacing around the stress checkbox rows so they don't bleed into languages */
        .stress_box_row {
            margin: 10px 0 !important;
            display: block;
        }

        input[type="text"], textarea { padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .truth_text textarea, .injuries textarea { width: 100%; min-height: 50px; margin: 3px; }
    </style>
</head>
<body>

<div class="charsheet">
    <div class="sheet-main_char">
        <div class="f-row visual
